<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Optimizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>Анкета клиента (Mini-CEO MVP)</h1>
        <form id="offerForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>ФИО Клиента</label>
                    <input type="text" id="name" placeholder="Иван Иванов" required>
                </div>
                <div class="input-group">
                    <label>Ежемесячный доход (₽)</label>
                    <input type="number" id="income" value="50000" required>
                </div>
                <div class="input-group">
                    <label>Ср. чек на АЗС (₽)</label>
                    <input type="number" id="gas_avg_check" value="0">
                </div>
                <div class="input-group">
                    <label>Склонность к оттоку (0.0 - 1.0)</label>
                    <input type="number" id="churn_score" step="0.1" min="0" max="1" value="0.1">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="is_loyal">
                    <label for="is_loyal">Лояльный клиент</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="has_debit_card">
                    <label for="has_debit_card">Есть дебетовая карта</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="has_credit_card">
                    <label for="has_credit_card">Есть кредитная карта</label>
                </div>

                <button type="submit">Рассчитать лучшее предложение</button>
            </div>
        </form>

        <div id="result">
            <h2 style="font-size: 18px; margin-bottom: 10px;">Рекомендация системы:</h2>
            <p id="recommendationText"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
